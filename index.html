<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KPFC 한국정책자금지원센터 | 이종현 대표</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #1a56db;
    --navy: #0f172a;
    --gold: #b45309;
    --highlight: #fde68a;
    --danger: #e11d48;
    --bg-light: #f8fafc;
    --white: #ffffff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { 
    font-family: 'Pretendard', sans-serif; 
    background-color: var(--white); 
    color: var(--navy); 
    line-height: 1.7; 
    word-break: keep-all; 
  }

  /* 애니메이션 */
  .fade-in { opacity: 0; transform: translateY(30px); transition: all 0.8s ease-out; }
  .fade-in.visible { opacity: 1; transform: translateY(0); }

  .mark { background: var(--highlight); padding: 2px 4px; border-radius: 4px; font-weight: 700; }
  .red-text { color: var(--danger); font-weight: 800; }
  .gold-text { color: var(--gold); font-weight: 700; }

  /* 헤더/히어로 */
  .hero {
    padding: 60px 20px 80px;
    text-align: center;
    background: linear-gradient(135deg, #f1f5f9 0%, #ffffff 100%);
    border-bottom: 1px solid #e2e8f0;
  }
  .hero-badge {
    display: inline-block;
    padding: 10px 24px;
    background: var(--navy);
    color: var(--white);
    border-radius: 50px;
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 20px;
    box-shadow: 0 4px 12px rgba(15, 23, 42, 0.15);
  }

  /* 로고 삽입 영역 */
  .logo-container {
    width: 100%;
    max-width: 200px;
    margin: 0 auto 24px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 60px; /* 로고가 없을 때도 공간 유지 */
  }
  .logo-container img {
    max-width: 100%;
    height: auto;
  }
  .logo-placeholder {
    width: 100%;
    padding: 15px;
    border: 2px dashed #cbd5e1;
    border-radius: 12px;
    color: #64748b;
    font-size: 13px;
    font-weight: 600;
  }

  .hero h1 { font-size: 34px; font-weight: 800; line-height: 1.4; margin-bottom: 24px; }
  .hero h1 span { color: var(--primary); text-decoration: underline; text-underline-offset: 8px; }
  
  .main-cta {
    display: inline-block;
    background: var(--primary);
    color: var(--white);
    padding: 22px 50px;
    border-radius: 16px;
    font-size: 20px;
    font-weight: 800;
    text-decoration: none;
    box-shadow: 0 10px 25px rgba(26, 86, 219, 0.3);
  }

  /* 섹션 */
  .section { padding: 80px 20px; max-width: 720px; margin: 0 auto; }
  .section-title { font-size: 28px; font-weight: 800; margin-bottom: 40px; text-align: center; }

  .info-card {
    background: var(--white);
    border: 1px solid #e2e8f0;
    border-radius: 24px;
    padding: 40px 30px;
    margin-bottom: 30px;
    box-shadow: 0 8px 30px rgba(0,0,0,0.04);
    border-top: 6px solid var(--primary);
  }
  .info-card h3 { font-size: 22px; margin-bottom: 15px; color: var(--navy); }

  /* 블루 섹션 */
  .accent-section { background-color: var(--primary); color: var(--white); padding: 80px 20px; }
  .white-inner-card {
    background: var(--white);
    border-radius: 20px;
    padding: 35px;
    color: var(--navy);
    margin-bottom: 25px;
  }
  .step-label {
    display: inline-block;
    background: var(--navy);
    color: var(--white);
    padding: 5px 14px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 800;
    margin-bottom: 15px;
  }

  /* 가격 안내 */
  .price-box {
    border: 2px solid var(--primary);
    background: #fdfdfd;
    border-radius: 24px;
    padding: 40px 30px;
    text-align: center;
    margin-bottom: 25px;
  }
  .price-header { font-size: 18px; font-weight: 700; color: var(--gold); }
  .price-main { font-size: 40px; font-weight: 800; color: var(--primary); margin-bottom: 10px; }

  /* 비교표 */
  .compare-container { width: 100%; overflow-x: auto; margin-top: 30px; }
  .compare-table { width: 100%; border-collapse: collapse; min-width: 500px; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
  .compare-table th { padding: 20px; background: #f1f5f9; font-weight: 800; border-bottom: 2px solid #e2e8f0; }
  .compare-table td { padding: 20px; text-align: center; border-bottom: 1px solid #eee; background: white; font-size: 15px; }
  .kpfc-col { background: #f0f7ff !important; font-weight: 700; color: var(--primary); }

  /* 버튼 그룹 */
  .btn-group { display: flex; flex-direction: column; gap: 15px; margin-top: 40px; }
  .btn-item { padding: 22px; border-radius: 16px; text-decoration: none; font-weight: 800; font-size: 18px; text-align: center; }
  .btn-naver { background: #03c75a; color: white; }
  .btn-home { background: var(--navy); color: white; }

  .footer { background: #0f172a; color: #94a3b8; padding: 60px 20px; text-align: center; font-size: 14px; }
</style>
</head>
<body>

  <section class="hero">
    <div class="hero-badge fade-in">🏆 국내 최초 정책자금 플랫폼 "나라똔" 공식 파트너</div>
    
    <div class="logo-container fade-in">
      <div class="logo-placeholder">한국정책자금지원센터 로고 자리</div>
    </div>
    <h1 class="fade-in">사장님, 정부지원금<br><span>'진짜'</span> 받게 해드립니다</h1>
    <p class="fade-in" style="font-weight: 600; color: #475569;">"세금 꼬박꼬박 내셨다면, 국가 혜택은 권리입니다."</p>
    <a href="tel:1588-9097" class="main-cta fade-in">📞 지금 바로 무료상담받기</a>
  </section>

  <section class="section" style="background: #fdf2f2; border-radius: 40px; margin-bottom: 80px;">
    <div class="section-title fade-in">
      <span class="red-text" style="display:block; font-size:16px; margin-bottom:10px;">🛑 저가형 컨설팅 주의</span>
      계약금 30만원 내외 업체를 조심하세요
    </div>
    <div class="compare-container fade-in">
      <table class="compare-table">
        <thead>
          <tr>
            <th>구분</th>
            <th style="color:var(--primary)">한국정책자금지원센터</th>
            <th>저가형 컨설팅</th>
          </tr>
        </thead>
        <tbody>
          <tr><td>전문 인력</td><td class="kpfc-col">네이버 인물등록 심사관</td><td>단순 영업 사원</td></tr>
          <tr><td>책임 범위</td><td class="kpfc-col">1년 전담 밀착 관리</td><td>서류 대행 후 종료</td></tr>
          <tr><td>심사 과정</td><td class="kpfc-col">현장 실사 및 면접 코칭</td><td>이메일 서류 접수 끝</td></tr>
          <tr><td>환불 규정</td><td class="kpfc-col">조달 실패 시 100% 환불</td><td>환불 불가 / 연락 두절</td></tr>
        </tbody>
      </table>
    </div>
  </section>

  <script>
    const observer = new IntersectionObserver((entries) => {
      entries.forEach(entry => { if (entry.isIntersecting) entry.target.classList.add('visible'); });
    }, { threshold: 0.1 });
    document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));
  </script>
</body>
</html>
